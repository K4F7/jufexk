name: Deploy Worker
on:
  push:
    branches: [main]
  workflow_dispatch:
concurrency:
  group: production-deploy
  cancel-in-progress: false
permissions:
  contents: read
jobs:
  deploy:
    environment: production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run types -- --check
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build
      - name: List pending D1 migrations
        run: npx wrangler d1 migrations list jufexk --remote
      - name: Export D1 backup
        run: |
          mkdir -p "${RUNNER_TEMP}/d1-backup"
          npx wrangler d1 export jufexk --remote --output "${RUNNER_TEMP}/d1-backup/jufexk-${GITHUB_RUN_ID}.sql" -y
          sha256sum "${RUNNER_TEMP}/d1-backup/jufexk-${GITHUB_RUN_ID}.sql" > "${RUNNER_TEMP}/d1-backup/jufexk-${GITHUB_RUN_ID}.sha256"
      - name: Store private D1 backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: d1-backup-${{ github.run_id }}
          path: ${{ runner.temp }}/d1-backup/
          retention-days: 3
          if-no-files-found: error
      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply jufexk --remote
      - name: Deploy Worker
        run: npx wrangler deploy
